version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      - DEEPSEEK_APIHOST=${DEEPSEEK_APIHOST}
      - DEEPSEEK_APIKEYSECRET=${DEEPSEEK_APIKEYSECRET}
      - GITHUB_REVIEW_LOG_URI=${GITHUB_REVIEW_LOG_URI}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - COMMIT_PROJECT=${COMMIT_PROJECT}
      - COMMIT_BRANCH=${COMMIT_BRANCH}
      - COMMIT_AUTHOR=${COMMIT_AUTHOR}
      - COMMIT_MESSAGE=${COMMIT_MESSAGE}
      - WEIXIN_APPID=${WEIXIN_APPID}
      - WEIXIN_SECRET=${WEIXIN_SECRET}
      - WEIXIN_TOUSER=${WEIXIN_TOUSER}
      - WEIXIN_TEMPLATE_ID=${WEIXIN_TEMPLATE_ID}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
