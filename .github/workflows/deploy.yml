name: CI/CD Build and Test

on:
  push:
    branches: [ main, master, exp-frontend ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 后端构建与测试
  backend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Build Backend
        run: mvn clean package -pl openai-code-review-test -am -DskipTests
        
      - name: Run Tests
        run: mvn test -pl openai-code-review-test

  # 前端构建测试
  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: frontend
        
      - name: Build Frontend
        run: npm run build
        working-directory: frontend

  # Docker 镜像构建
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      # 构建后端镜像
      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: code-review-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      # 构建前端镜像
      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: code-review-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: List Docker Images
        run: |
          echo "=== Docker Images Built ==="
          docker images
